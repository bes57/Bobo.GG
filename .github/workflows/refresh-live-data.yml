# Live VCT data refresh — moves the VLR scrape OFF Render (which sits behind
# Cloudflare's bot wall and has an ephemeral filesystem) and runs it on
# GitHub's runners.  When new data is found it's committed back to main, which
# auto-deploys to Render with fresh CSV/JSON files.
#
# Cadence:
#   - cron every 15 min (GitHub may delay during high load; treat as ~15-30 min)
#   - manual "Run workflow" button in the Actions tab
#   - automatic dispatch from any push to main that touches scraper code
#     (so a code change triggers an immediate refresh)
#
# One-time setup required in the repo:
#   Settings → Actions → General → Workflow permissions
#     → "Read and write permissions" + "Allow GitHub Actions to create and
#       approve pull requests" can be unchecked.
#   (Defaults are read-only — this job will not be able to push back without
#    write perms enabled.)

name: Refresh VCT live data

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      verbose:
        description: 'Print full scraper log'
        required: false
        default: 'false'
  push:
    branches: [main]
    paths:
      - 'scrapers/**'
      - 'MoreTestingMaybeFiles.py'
      - '.github/workflows/refresh-live-data.yml'

# Cancel a queued run if a newer one starts — prevents pileup if cron triggers
# overlap with a manual run.  In-progress runs are NOT cancelled (let them
# finish their commit cleanly).
concurrency:
  group: refresh-live-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          # Use the default GITHUB_TOKEN; works for pushing to the same repo
          # as long as workflow permissions are set to read-and-write.
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run live-data refresh
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          python scrapers/RefreshLiveData.py
          echo ""
          echo "=== final progress file ==="
          cat /tmp/mhub_refresh_progress.json | python -m json.tool || true

      - name: Stage data changes
        id: stage
        run: |
          git add \
            data/maps/*.csv \
            data/series/*.csv \
            data/match_results.csv \
            data/match_dates.json \
            data/rating_timeline.json \
            data/upcoming_matches.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data files changed."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Data changes staged:"
            git diff --cached --stat
          fi

      - name: Commit and push
        if: steps.stage.outputs.changed == 'true'
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          # Build a useful commit message from the progress file when possible.
          msg="$(python -c "
          import json, pathlib
          try:
              p = json.load(open('/tmp/mhub_refresh_progress.json'))
              parts = [l for l in p.get('log', []) if '✓ Scraped' in l or 'Ratings rebuilt' in l]
              if parts:
                  print(' • '.join(parts))
              else:
                  print(p.get('message', 'Refresh data').strip())
          except Exception:
              print('Refresh live VCT data')
          " 2>/dev/null || echo 'Refresh live VCT data')"
          git commit -m "auto: ${msg}" -m "Scraped by .github/workflows/refresh-live-data.yml"
          # Rebase on top of any concurrent push, then push.  Retry once if a
          # manual push raced ours.
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin HEAD:main && break
            echo "push attempt $i failed, retrying..."
            sleep $((i * 3))
          done

      - name: Summary
        if: always()
        run: |
          echo "### Refresh result" >> "$GITHUB_STEP_SUMMARY"
          if [ -f /tmp/mhub_refresh_progress.json ]; then
            python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json
          p = json.load(open('/tmp/mhub_refresh_progress.json'))
          print(f"- **Phase:** `{p.get('phase')}`")
          print(f"- **Message:** {p.get('message','')}")
          if p.get('errors'):
              print(f"- **Errors:**")
              for e in p['errors']:
                  print(f"  - `{e}`")
          print("- **Log:**")
          for l in p.get('log', []):
              print(f"  - {l}")
          PY
          else
            echo "(no progress file written)" >> "$GITHUB_STEP_SUMMARY"
          fi
